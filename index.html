<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carolina Lopera Arango | LM JURÍDICO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Definición de la nueva paleta de colores basada en el logo */
        :root { 
            --color-logo: #f2f0e4; /* Crema/Hueso del logo */
            --dorado-acento: #c5a059; /* Dorado para detalles */
            --negro-fondo: #000000; 
            --gris-botones: #111111; 
        }

        body { 
            background-color: var(--negro-fondo); 
            color: var(--color-logo); 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 50px 20px; 
        }

        .container { 
            width: 100%; 
            max-width: 400px; 
            text-align: center; 
        }

        /* Estilo del Logo */
        .logo { 
            width: 130px; 
            height: 130px; 
            border-radius: 50%; 
            border: 1.5px solid var(--color-logo); 
            margin-bottom: 15px; 
            object-fit: cover;
            padding: 4px;
        }

        h1 { 
            font-size: 20px; 
            margin: 10px 0; 
            letter-spacing: 3px; 
            text-transform: uppercase; 
            font-weight: 300;
        }
        
        .lema { 
            color: var(--dorado-acento); 
            font-size: 10px; 
            text-transform: uppercase; 
            letter-spacing: 4px; 
            margin-bottom: 40px; 
            font-weight: bold; 
        }

        /* Estilo de los Botones */
        .btn { 
            background: var(--gris-botones); 
            border: 1px solid #222; 
            padding: 16px; 
            margin-bottom: 15px; 
            border-radius: 12px; 
            display: flex; 
            align-items: center; 
            text-decoration: none; 
            color: var(--color-logo); 
            transition: all 0.3s ease; 
        }

        /* Botón Destacado (WhatsApp Principal) */
        .btn-destacado { 
            background: var(--color-logo); 
            color: var(--negro-fondo); 
            border: none; 
            font-weight: bold; 
        }

        .btn:hover { 
            border-color: var(--color-logo);
            transform: translateY(-2px);
        }

        .btn-destacado:hover {
            background: var(--dorado-acento);
            color: var(--negro-fondo);
        }

        .btn i { 
            font-size: 20px; 
            width: 35px; 
            text-align: center; 
        }

        .txt { 
            flex-grow: 1; 
            text-align: left; 
            margin-left: 12px; 
        }

        .tit { 
            display: block; 
            font-size: 15px; 
            font-weight: bold; 
            letter-spacing: 0.5px;
        }

        .desc { 
            display: block; 
            font-size: 11px; 
            opacity: 0.7; 
            margin-top: 3px; 
        }
        
        footer { 
            margin-top: 60px; 
            font-size: 9px; 
            opacity: 0.4; 
            letter-spacing: 3px; 
            text-transform: uppercase;
        }

        /* Separador elegante */
        .separador {
            height: 1px;
            background: linear-gradient(to right, transparent, #333, transparent);
            margin: 20px 0;
            border: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="logo.png" alt="LM Jurídico Logo" class="logo">
        
        <h1>Carolina Lopera</h1>
        <p class="lema">Precisión • Estrategia • Resultados</p>
        
        <a href="https://wa.me/573104412351?text=Hola%20Dra.%20Carolina,%20solicito%20una%20Asesoría%20Jurídica" class="btn btn-destacado">
            <i class="fab fa-whatsapp"></i>
            <div class="txt">
                <span class="tit">Asesoría Jurídica</span>
                <span class="desc">Atención Inmediata</span>
            </div>
        </a>

        <a href="https://wa.me/573104412351?text=Hola,%20necesito%20información%20sobre%20Tutelas" class="btn">
            <i class="fas fa-gavel"></i>
            <div class="txt">
                <span class="tit">Tutelas y Peticiones</span>
                <span class="desc">Defensa de Derechos</span>
            </div>
        </a>

        <a href="https://wa.me/573104412351?text=Deseo%20información%20sobre%20Fideicomisos" class="btn">
            <i class="fas fa-lock"></i>
            <div class="txt">
                <span class="tit">Fideicomisos Civiles</span>
                <span class="desc">Protección de Patrimonio</span>
            </div>
        </a>

        <hr class="separador">

        <a href="#" target="_blank" class="btn">
            <i class="fab fa-linkedin-in"></i>
            <div class="txt">
                <span class="tit">LinkedIn</span>
                <span class="desc">Perfil Profesional</span>
            </div>
        </a>

        <a href="https://www.google.com/maps?q=Medellin" target="_blank" class="btn">
            <i class="fas fa-map-marker-alt"></i>
            <div class="txt">
                <span class="tit">Ubicación</span>
                <span class="desc">Medellín, Antioquia</span>
            </div>
        </a>

        <footer>LM JURÍDICO & ESTRATEGIA © 2026</footer>
    </div>

</body>
</html>
